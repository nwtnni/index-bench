[package]
name = "index-bench"
version = "0.1.0"
edition = "2024"

[features]
stat = ["art/stat"]
opt-node3-get = ["art/opt-node3-get"]
opt-node15-get = ["art/opt-node15-get"]
opt-empty-match = ["art/opt-empty-match"]
opt-memcpy = ["art/opt-memcpy"]
opt-prefix = ["art/opt-prefix"]
opt = ["opt-node3-get", "opt-node15-get", "opt-empty-match", "opt-memcpy", "opt-prefix"]

[dependencies]
anyhow = "1.0.99"
hwlocality = "1.0.0-alpha.10"
libc = "0.2.175"
log = "0.4.27"
perf-event2 = "0.7.4"
serde = { version = "1.0.219", features = ["derive"] }
serde_json = "1.0.143"
ycsb = { git = "https://github.com/nwtnni/ycsb.git", features = ["cartesian", "serde"] }
art = { git = "ssh://github.com/nwtnni/art" }
cartesian = { git = "ssh://github.com/nwtnni/cartesian" }
toml = "0.9.5"
scc = "3.0.2"
rapidhash = "4.0.0"
rand = "0.9.2"

# [features]
# default = []
# stat = ["art/stat"]
